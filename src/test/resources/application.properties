# Test configuration: use H2 in-memory and let Hibernate create/drop schema
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Désactiver SSL pour les tests (pas de keystore nécessaire)
server.ssl.enabled=false
server.port=0

# Credentials de test pour Spring Security
app.security.username=testuser
app.security.password={noop}testpass
