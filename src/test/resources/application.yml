# Test configuration: use H2 in-memory and let Hibernate create/drop schema
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

# Désactiver SSL pour les tests (pas de keystore nécessaire)
server:
  ssl:
    enabled: false
  port: 0

# Credentials de test pour Spring Security
app:
  security:
    username: testuser
    password: "{noop}testpass"