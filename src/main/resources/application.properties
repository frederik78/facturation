# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=facturation

# ── HTTPS (TLS) ───────────────────────────────────────────────────────────────
# Port HTTPS principal
server.port=8443
server.ssl.enabled=true
# Chemin vers le keystore PKCS12 (Let's Encrypt ou autre certificat externe)
# Surcharger via variable d'environnement : SERVER_SSL_KEY_STORE=/path/to/keystore.p12
server.ssl.key-store=${SSL_KEY_STORE:classpath:keystore-dev.p12}
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-alias=${SSL_KEY_ALIAS:facturation}

# Port HTTP maintenu uniquement pour la redirection vers HTTPS (voir HttpToHttpsConfig)
server.http.port=8080

# ── SQLite / JPA ─────────────────────────────────────────────────────────────
# La base SQLite est stockée dans ./data/facturation.db
spring.datasource.url=jdbc:sqlite:./data/facturation.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# Hibernate ne touche pas au schéma : c'est schema.sql qui crée les tables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Spring exécute schema.sql au démarrage (CREATE TABLE IF NOT EXISTS)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# SQLite : active les clés étrangères (désactivées par défaut dans SQLite)
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON;

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Logs ─────────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.info.minatchy=INFO

# ── Authentification (utilisateur unique) ────────────────────────────────────
# Le mot de passe doit être encodé en BCrypt.
# Générer avec : htpasswd -bnBC 10 "" motdepasse | tr -d ':\n'
# ou via Spring CLI : spring encodepassword motdepasse
# Par défaut : admin / changeit (À CHANGER EN PRODUCTION)
