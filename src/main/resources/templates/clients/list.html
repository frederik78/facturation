<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr"
      th:replace="~{layout :: layout(~{::content}, ~{::scripts}, 'Clients', 'clients')}">
<th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Clients</h1>
        <a href="/clients/new" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nouveau client
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Nom</th>
                    <th>Adresse</th>
                    <th>Courriel</th>
                    <th>Téléphone</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${clients.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">Aucun client enregistré</td>
                </tr>
                <tr th:each="client : ${clients}">
                    <td class="fw-semibold" th:text="${client.name}"></td>
                    <td th:text="${client.address != null ? client.address + ', ' + client.city : ''}"></td>
                    <td th:text="${client.email}"></td>
                    <td th:text="${client.phone}"></td>
                    <td class="text-end">
                        <a th:href="@{/clients/{id}/edit(id=${client.id})}"
                           class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/clients/{id}/delete(id=${client.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer ce client ?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger ms-1">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
