<!DOCTYPE html>
<th:block th:fragment="layout(content, scripts, pageTitle, activePage)">
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle != null ? pageTitle + ' - Facturation' : 'Facturation'}">Facturation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #495057; border-radius: 6px; margin-bottom: 2px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #f0f4ff; color: #0d6efd; }
        .sidebar .nav-link i { width: 20px; }
        .main-content { padding: 2rem; }
        .badge-DRAFT    { background-color: #6c757d; }
        .badge-SENT     { background-color: #0d6efd; }
        .badge-PAID     { background-color: #198754; }
        .badge-CANCELLED{ background-color: #dc3545; }
        .table-invoices th { background: #f8f9fa; }
        /* Placeholder styling: gray and italic */
        input::placeholder, textarea::placeholder, select::placeholder {
            color: #6c757d !important;
            font-style: italic;
            opacity: 1; /* ensure full color in some browsers */
        }
        /* Also support Bootstrap form-control placeholders */
        .form-control::placeholder { color: #6c757d; font-style: italic; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="bi bi-receipt-cutoff me-2"></i>Facturation</a>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-white-50 me-3 small" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-box-arrow-right me-1"></i>D&eacute;connexion
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 sidebar py-3 px-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'" href="/">
                        <i class="bi bi-house me-2"></i>Tableau de bord
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'invoices'} ? 'active'" href="/invoices">
                        <i class="bi bi-file-earmark-text me-2"></i>Factures
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'clients'} ? 'active'" href="/clients">
                        <i class="bi bi-people me-2"></i>Clients
                    </a>
                </li>
                <hr/>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'settings'} ? 'active'" href="/settings">
                        <i class="bi bi-gear me-2"></i>Mon profil
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Contenu principal -->
        <main class="col-md-10 main-content">
            <!-- Messages flash -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Fragment de contenu -->
            <th:block th:replace="${content}"/>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="${scripts} ?: ~{}"></script>
</body>
</html>
</th:block>
