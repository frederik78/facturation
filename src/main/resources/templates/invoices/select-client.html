<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr"
      th:replace="~{layout :: layout(~{::content}, ~{::scripts}, 'Nouvelle facture', 'invoices')}">
<th:block th:fragment="content">

    <div class="d-flex align-items-center mb-4">
        <a href="/invoices" class="btn btn-outline-secondary btn-sm me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="h3 mb-0">Nouvelle facture — Choisir un client</h1>
    </div>

    <div th:if="${clients.isEmpty()}" class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i>
        Aucun client enregistré.
        <a href="/clients/new" class="alert-link">Créer un client d'abord</a>
    </div>

    <div th:if="${!clients.isEmpty()}" class="card border-0 shadow-sm" style="max-width: 480px;">
        <div class="card-body">
            <form action="/invoices/new" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Client <span class="text-danger">*</span></label>
                    <select name="clientId" class="form-select" required>
                        <option value="">-- Sélectionner --</option>
                        <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-arrow-right me-1"></i>Créer la facture
                </button>
            </form>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
