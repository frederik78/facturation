<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr"
      th:replace="~{layout :: layout(~{::content}, ~{::scripts}, 'Factures', 'invoices')}">
<th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Factures</h1>
        <a href="/invoices/new" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nouvelle facture
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 table-invoices">
                <thead>
                <tr>
                    <th>N°</th>
                    <th>Date</th>
                    <th>Client</th>
                    <th class="text-end">Sous-total</th>
                    <th class="text-end">Total TTC</th>
                    <th>Statut</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${invoices.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4">Aucune facture</td>
                </tr>
                <tr th:each="inv : ${invoices}">
                    <td class="fw-semibold" th:text="'#' + ${inv.invoiceNumber}"></td>
                    <td th:text="${#temporals.format(inv.invoiceDate, 'dd/MM/yyyy')}"></td>
                    <td th:text="${inv.client.name}"></td>
                    <td class="text-end"
                        th:text="${#numbers.formatDecimal(inv.subtotal, 1, 'COMMA', 2, 'POINT')} + ' $'"></td>
                    <td class="text-end fw-semibold"
                        th:text="${#numbers.formatDecimal(inv.total, 1, 'COMMA', 2, 'POINT')} + ' $'"></td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${inv.status.name()}"
                              th:text="${inv.status.label}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/invoices/{id}/edit(id=${inv.id})}"
                           class="btn btn-sm btn-outline-secondary" title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/invoices/{id}/pdf(id=${inv.id})}"
                           class="btn btn-sm btn-outline-primary ms-1" title="Télécharger PDF">
                            <i class="bi bi-file-pdf"></i>
                        </a>
                        <form th:action="@{/invoices/{id}/delete(id=${inv.id})}" method="post"
                              class="d-inline" onsubmit="return confirm('Supprimer cette facture ?')">
                            <button class="btn btn-sm btn-outline-danger ms-1" title="Supprimer">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
