<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr"
      th:replace="~{layout :: layout(~{::content}, ~{::scripts}, 'Tableau de bord', 'home')}">
<th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Tableau de bord</h1>
        <a href="/invoices/new" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nouvelle facture
        </a>
    </div>

    <!-- Alerte si profil non configuré -->
    <div th:if="${!issuerConfigured}" class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i>
        Votre profil émetteur n'est pas encore configuré.
        <a href="/settings" class="alert-link">Configurer maintenant</a>
    </div>

    <!-- Cartes de statistiques -->
    <div class="row g-3 mb-4">
        <div class="col-sm-3">
            <div class="card text-center border-0 shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-primary" th:text="${invoices.size()}">0</div>
                    <div class="text-muted small">Total factures</div>
                </div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card text-center border-0 shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-success"
                         th:text="${#lists.size(invoices.?[status.name() == 'PAID'])}">0</div>
                    <div class="text-muted small">Payées</div>
                </div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card text-center border-0 shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-warning"
                         th:text="${#lists.size(invoices.?[status.name() == 'SENT'])}">0</div>
                    <div class="text-muted small">Envoyées</div>
                </div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card text-center border-0 shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-secondary"
                         th:text="${#lists.size(invoices.?[status.name() == 'DRAFT'])}">0</div>
                    <div class="text-muted small">Brouillons</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dernières factures -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">Dernières factures</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>N°</th>
                    <th>Date</th>
                    <th>Client</th>
                    <th class="text-end">Total</th>
                    <th>Statut</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${invoices.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">Aucune facture pour l'instant</td>
                </tr>
                <tr th:each="inv, invoiceStat : ${invoices}" th:if="${invoiceStat.index < 10}">
                    <td th:text="'#' + ${inv.invoiceNumber}"></td>
                    <td th:text="${#temporals.format(inv.invoiceDate, 'dd/MM/yyyy')}"></td>
                    <td th:text="${inv.client.name}"></td>
                    <td class="text-end fw-semibold"
                        th:text="${#numbers.formatDecimal(inv.total, 1, 'COMMA', 2, 'POINT')} + ' $'"></td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${inv.status.name()}"
                              th:text="${inv.status.label}"></span>
                    </td>
                    <td>
                        <a th:href="@{/invoices/{id}/edit(id=${inv.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/invoices/{id}/pdf(id=${inv.id})}" class="btn btn-sm btn-outline-primary ms-1">
                            <i class="bi bi-file-pdf"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
