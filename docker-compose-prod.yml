services:
  facturation:
    image: ghcr.io/frederik78/facturation:latest
    container_name: facturation
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/app/certs
      - ./data:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_SSL_KEY_STORE=file:/app/certs/karu.p12
      - SPRING_SSL_KEY_STORE_PASSWORD=ton_mot_de_passe
      - SPRING_SSL_KEY_STORE_TYPE=PKCS12
    restart: unless-stopped